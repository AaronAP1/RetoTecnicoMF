# Test Configuration
spring.profiles.active=test

# R2DBC Configuration for Tests
spring.r2dbc.url=r2dbc:h2:mem:///testdb?options=DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.r2dbc.username=sa
spring.r2dbc.password=

# Logging Configuration for Tests
logging.level.com.pacifico=DEBUG
logging.level.org.springframework.r2dbc=DEBUG
logging.level.io.r2dbc=DEBUG
logging.level.reactor.netty.http.client=DEBUG

# Payment Service Configuration (Will be overridden in integration tests)
payment.service.url=http://localhost:8081
payment.service.timeout=5s

# Test Database Configuration
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Disable actuator endpoints for tests
management.endpoints.enabled-by-default=false
